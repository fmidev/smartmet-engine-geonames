# Engine configuration for OSM-backend smoke testing.
#
# Loads Ukraine and Finland populated places from the smartmet-library-osm
# test fixtures. No database connection is opened — the load_from_osm path
# in Impl populates everything from TSV files.

backend = "osm";

osm:
{
	data_dir = "/home/mheiskan/hub/smartmet-library-osm/test/data";
};

disable_autocomplete = false;
strict = true;
verbose = true;

locale = "en_US.UTF-8";
ascii_autocomplete = false;
fallback_encodings = [ "latin1" ];

# DEM/landcover are optional. Use the same fixture rasters the GeoNames
# tests use; if missing the engine will return NaN for elevation/dem,
# which extract_osm_place handles.
demdir = "/usr/share/smartmet/test/data/gis/rasters/viewfinder";
landcoverdir = "/usr/share/smartmet/test/data/gis/rasters/globcover";
maxdemresolution = 0;

cache:
{
	max_size = 100000;
	suggest_max_size = 1000;
};

security:
{
	disable = true;
};

autoreload:
{
	period = 0;  # disabled for tests
};

areas:
{
	default = "COUNTRY";
};

priorities:
{
	match = 100;

	populations:
	{
		default = 100000;
	};

	features:
	{
		default = "default_features";
	};

	default_features:
	{
		PPLC    = 35;
		PPLA    = 25;
		PPL     = 20;
		PPLA2   = 25;
		PPLA3   = 25;
		PPLA4   = 20;
		PPLX    = 19;
		default = 0;
	};

	areas:
	{
		default = 0;
	};

	countries:
	{
		default = 0;
	};
};
